<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />

  <body>
    <header class="header">

      <h1 class="titulo-contacto text-secondary">Contactanos</h1>

          <label for="email"> Tu email: </label>

        <div class="grupo-input">
          <label for="mensaje"> Escribe el mensaje: </label>

        </div>
        <button class="btn bg-secondary text-dark" type="submit">Enviar / consultar</button>
      </form>

    <footer>
